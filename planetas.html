<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Solar Realista</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family: Arial;
    background:#000;
}

/* Panel responsive */
#info {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.85);
    color: gold;
    padding: 15px;
    box-sizing: border-box;
    max-height: 40%;
    overflow-y: auto;
    border-top: 2px solid gold;
}

#info h2 { margin:0 0 10px 0; }
canvas { display:block; }
</style>
</head>

<body>

<div id="info">
    <h2>Sistema Solar</h2>
    <p>Toca un planeta para ver información</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();

// FONDO GALAXIA
new THREE.TextureLoader().load(
    "https://cdn.pixabay.com/photo/2016/03/31/19/56/galaxy-1293831_1280.jpg",
    texture => scene.background = texture
);

// CÁMARA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0, 50, 120);

// RENDER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLES
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// LUZ
const light = new THREE.PointLight(0xffffff, 2, 1000);
scene.add(light);

// INFO BOX
const infoBox = document.getElementById("info");

// RAYCASTER
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// SOL (más grande)
const sun = new THREE.Mesh(
    new THREE.SphereGeometry(10, 32, 32),
    new THREE.MeshBasicMaterial({color:0xffcc00})
);
scene.add(sun);

// DATOS REALISTAS (ESCALA REDUCIDA)
const data = [
    {name:"Mercurio", size:0.5, dist:15, speed:0.04, info:"Planeta más cercano al Sol"},
    {name:"Venus", size:0.9, dist:20, speed:0.03, info:"Planeta más caliente"},
    {name:"Tierra", size:1, dist:25, speed:0.02, info:"Nuestro hogar"},
    {name:"Marte", size:0.7, dist:30, speed:0.018, info:"Planeta rojo"},
    {name:"Júpiter", size:3, dist:40, speed:0.01, info:"El más grande"},
    {name:"Saturno", size:2.5, dist:50, speed:0.008, info:"Anillos espectaculares"},
    {name:"Urano", size:2, dist:60, speed:0.006, info:"Gira de lado"},
    {name:"Neptuno", size:2, dist:70, speed:0.005, info:"Muy frío"}
];

const planets = [];

// CREAR PLANETAS
data.forEach((p,i)=>{
    const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(p.size, 32, 32),
        new THREE.MeshStandardMaterial({color:0x8888ff})
    );

    mesh.userData = p;
    scene.add(mesh);
    planets.push(mesh);

    // ÓRBITA
    const orbit = new THREE.Mesh(
        new THREE.RingGeometry(p.dist-0.1, p.dist+0.1, 64),
        new THREE.MeshBasicMaterial({color:0xffffff, side:THREE.DoubleSide, transparent:true, opacity:0.2})
    );
    orbit.rotation.x = Math.PI/2;
    scene.add(orbit);

    // 🌙 LUNA (solo Tierra)
    if(p.name === "Tierra"){
        const moon = new THREE.Mesh(
            new THREE.SphereGeometry(0.3,16,16),
            new THREE.MeshStandardMaterial({color:0xaaaaaa})
        );
        mesh.add(moon);
        moon.position.x = 2;
    }
});

// CLICK
function click(event){
    mouse.x = (event.clientX / window.innerWidth)*2 -1;
    mouse.y = -(event.clientY / window.innerHeight)*2 +1;

    raycaster.setFromCamera(mouse, camera);
    const hit = raycaster.intersectObjects(planets);

    if(hit.length > 0){
        const p = hit[0].object.userData;
        infoBox.innerHTML = `
            <h2>${p.name}</h2>
            <p>${p.info}</p>
        `;
    }
}

window.addEventListener("click", click);
window.addEventListener("touchstart", e=>{
    click(e.touches[0]);
});

// ANIMACIÓN
function animate(){
    requestAnimationFrame(animate);

    const t = Date.now()*0.0005;

    planets.forEach((p,i)=>{
        const d = data[i];
        p.position.x = Math.cos(t * d.speed * 50) * d.dist;
        p.position.z = Math.sin(t * d.speed * 50) * d.dist;
        p.rotation.y += 0.01;
    });

    controls.update();
    renderer.render(scene,camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
