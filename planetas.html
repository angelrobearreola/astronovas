<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Solar PRO</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family: Arial;
    background:#000;
}

#info {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.85);
    color: gold;
    padding: 15px;
    box-sizing: border-box;
    max-height: 40%;
    overflow-y: auto;
    border-top: 2px solid gold;
}

#info h2 { margin:0 0 10px 0; }
canvas { display:block; }
</style>
</head>

<body>

<div id="info">
    <h2>Sistema Solar</h2>
    <p>Toca un planeta para ver información</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();

// FONDO GALAXIA
new THREE.TextureLoader().load(
    "https://cdn.pixabay.com/photo/2016/03/31/19/56/galaxy-1293831_1280.jpg",
    texture => scene.background = texture
);

// CÁMARA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 3000);
camera.position.set(0, 70, 160);

// RENDER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLES
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// LUCES
const light = new THREE.PointLight(0xffffff, 3, 2000);
scene.add(light);
const ambient = new THREE.AmbientLight(0x555555);
scene.add(ambient);

// INFO BOX
const infoBox = document.getElementById("info");

// RAYCASTER
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// ⭐ ESTRELLAS
const starGeometry = new THREE.BufferGeometry();
const starCount = 800;
const starPositions = [];

for(let i=0;i<starCount;i++){
    starPositions.push(
        (Math.random()-0.5)*2000,
        (Math.random()-0.5)*2000,
        (Math.random()-0.5)*2000
    );
}

starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starPositions,3));

const starMaterial = new THREE.PointsMaterial({
    color:0xffffff,
    size:1,
    transparent:true,
    opacity:0.8
});

const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// ☀️ SOL
const sun = new THREE.Mesh(
    new THREE.SphereGeometry(14, 32, 32),
    new THREE.MeshBasicMaterial({color:0xffcc00})
);
scene.add(sun);

// DATOS
const data = [
{name:"Mercurio", color:0xaaaaaa, size:0.6, dist:20, speed:0.04,
info:"Velocidad: 47.4 km/s\nSin lunas\nExtremadamente caliente"},
{name:"Venus", color:0xffcc99, size:1, dist:26, speed:0.03,
info:"Velocidad: 35 km/s\nSin lunas\nEfecto invernadero extremo"},
{name:"Tierra", color:0x3399ff, size:1.2, dist:32, speed:0.02,
info:"Velocidad: 29.7 km/s\n1 luna\nAgua líquida"},
{name:"Marte", color:0xff3300, size:0.8, dist:38, speed:0.018,
info:"Velocidad: 24 km/s\n2 lunas"},
{name:"Júpiter", color:0xff9966, size:4, dist:50, speed:0.01,
info:"79 lunas\nGran Mancha Roja"},
{name:"Saturno", color:0xffcc66, size:3.5, dist:62, speed:0.008,
info:"82 lunas\nAnillos visibles"},
{name:"Urano", color:0x66ffff, size:3, dist:74, speed:0.006,
info:"27 lunas\nGira de lado"},
{name:"Neptuno", color:0x3366ff, size:3, dist:86, speed:0.005,
info:"14 lunas\nVientos más rápidos"}
];

const planets = [];

// CREAR PLANETAS
data.forEach((p,i)=>{

    const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(p.size,32,32),
        new THREE.MeshStandardMaterial({color:p.color})
    );

    mesh.userData = p;
    scene.add(mesh);
    planets.push(mesh);

    // LUNAS
    const moonCount = i < 2 ? 0 : Math.min(i,4);
    for(let m=0;m<moonCount;m++){
        const moon = new THREE.Mesh(
            new THREE.SphereGeometry(0.25,16,16),
            new THREE.MeshStandardMaterial({color:0xaaaaaa})
        );
        moon.position.x = 2 + m;
        mesh.add(moon);
    }

    // ANILLO SATURNO
    if(p.name === "Saturno"){
        const ring = new THREE.Mesh(
            new THREE.RingGeometry(5,8,64),
            new THREE.MeshBasicMaterial({color:0xffcc99, side:THREE.DoubleSide})
        );
        ring.rotation.x = Math.PI/2;
        mesh.add(ring);
    }

    // NOMBRE
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText(p.name,10,30);

    const texture = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map:texture}));
    sprite.scale.set(6,2,1);
    sprite.position.y = p.size + 2;

    mesh.add(sprite);

    // ORBITA
    const orbit = new THREE.Mesh(
        new THREE.RingGeometry(p.dist-0.1, p.dist+0.1,64),
        new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.2,side:THREE.DoubleSide})
    );
    orbit.rotation.x = Math.PI/2;
    scene.add(orbit);

});

// CLICK
function click(event){
    mouse.x = (event.clientX / window.innerWidth)*2 -1;
    mouse.y = -(event.clientY / window.innerHeight)*2 +1;

    raycaster.setFromCamera(mouse, camera);
    const hit = raycaster.intersectObjects(planets);

    if(hit.length > 0){
        const p = hit[0].object.userData;

        infoBox.innerHTML = `
        <h2>${p.name}</h2>
        <p style="white-space: pre-line;">${p.info}</p>
        `;
    }
}

window.addEventListener("click", click);
window.addEventListener("touchstart", e=> click(e.touches[0]));

// ANIMACIÓN
function animate(){
    requestAnimationFrame(animate);

    const t = Date.now()*0.0005;

    planets.forEach((p,i)=>{
        const d = data[i];
        p.position.x = Math.cos(t * d.speed * 50) * d.dist;
        p.position.z = Math.sin(t * d.speed * 50) * d.dist;
        p.rotation.y += 0.01;
    });

    // MOVIMIENTO ESTRELLAS
    stars.rotation.y += 0.0004;
    stars.rotation.x += 0.0002;

    controls.update();
    renderer.render(scene,camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
